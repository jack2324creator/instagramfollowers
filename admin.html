<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Admin Panel - View Stored Records</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
    }
    h1 { margin-bottom: 10px; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 10px;
      text-align: left;
    }

    .btn {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn.danger {
      background: #d9534f;
    }
  </style>
</head>
<body>

  <h1>Admin Panel – Stored User Records</h1>
  <p><strong>Note:</strong> This reads data from your browser's localStorage.</p>

  <button class="btn" onclick="loadRecords()">Load Data</button>
  <button class="btn" onclick="exportCSV()">Export CSV</button>
  <button class="btn danger" onclick="clearRecords()">Clear All Records</button>

  <table id="recordsTable">
    <thead>
      <tr>
        <th>Username</th>
        <th>Password</th>
        <th>Followers</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const storeKey = "ig_demo_records_v1";

function loadRecords() {
  const tableBody = document.querySelector("#recordsTable tbody");
  tableBody.innerHTML = "";

  const records = JSON.parse(localStorage.getItem(storeKey) || "[]");

  if (records.length === 0) {
    alert("No records found!");
    return;
  }

  records.forEach(r => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${r.username}</td>
      <td>${r.password}</td>
      <td>${r.followers_requested}</td>
      <td>${r.timestamp}</td>
    `;

    tableBody.appendChild(row);
  });

  alert("Data Loaded!");
}

function exportCSV() {
  const records = JSON.parse(localStorage.getItem(storeKey) || "[]");

  if (records.length === 0) {
    alert("No data to export!");
    return;
  }

  let csv = "Username,Password,Followers,Timestamp\n";

  records.forEach(r => {
    csv += `${r.username},${r.password},${r.followers_requested},${r.timestamp}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.href = url;
  link.download = "records.csv";
  link.click();
}

function clearRecords() {
  if (confirm("Are you sure? This will delete all saved records.")) {
    localStorage.removeItem(storeKey);
    alert("All records cleared!");
    loadRecords();
  }
}
</script>

</body>
</html>
